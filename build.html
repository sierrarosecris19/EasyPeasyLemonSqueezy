<head>

    <style> 
    #recipe {
        text-align: center;
        background-color: white;
        visibility: hidden;

    .build {

        font-family: "Lucida Console", monospace;
    }
    body {

            text-align: center;
    }

    .food {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
    }

    .food img {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
    }

    #tofu {

    #chicken {

    #potato {

    #rice {

            right: 150px;
    }

    #sweetPotato {
            top: 0px;
    }


    #broccoli {
            bottom: 5px;
            left: 150px;
    }

    #carrots {
            bottom: 5px;
            right: 150px;
    }

    #greenBeans {

    }

</head>

    <div class="title"
        <h2>Easy Peasy Lemon Squeezy</h2>

<div class="build">

    </div>

            <img id="sweetPotato" src="Food/Carbs/SweetPotato.png" alt="sweetpotato" id="sweetPotato">
        </div>
    <p id="Ingredient-name">Ingredient 3: Vegetable</p>
        <div class="food">
            <img id="broccoli" src="Food/Vegetables/Broccoli.png" alt="broccoli" id="broccoli">
